services:
  - type: web
    name: nivas-modular
    runtime: static
    # Nothing to compile — plain HTML, CSS and JS.
    buildCommand: ""
    # Repo root already contains index.html
    staticPublishPath: .
    pullRequestPreviewsEnabled: false

    headers:
      # Assets are not content-hashed, so the browser must revalidate.
      # Render's CDN still caches, and stale-while-revalidate keeps it fast.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=0, s-maxage=86400, stale-while-revalidate=604800

      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
